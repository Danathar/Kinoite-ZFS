name: Build PR Image

on:
  pull_request:
    # Skip PR CI for docs/readme-only changes.
    paths-ignore:
      - README.md
      - "**/README.md"
      - docs/**
      - "**/*.md"

permissions:
  contents: read
  packages: read

env:
  # Keep PR validation on the same moving defaults as `main`.
  AKMODS_UPSTREAM_REF: 9d13b6950811cdaae2e8ab748c85c5da35810ae3
  DEFAULT_BASE_IMAGE: ghcr.io/ublue-os/kinoite-main:latest
  DEFAULT_BUILD_CONTAINER_IMAGE: ghcr.io/ublue-os/devcontainer:latest
  DEFAULT_ZFS_MINOR_VERSION: "2.4"

jobs:
  prepare-pr-build:
    name: Resolve PR Build Inputs
    runs-on: ubuntu-24.04
    outputs:
      fedora_version: ${{ steps.inputs.outputs.version }}
      kernel_release: ${{ steps.inputs.outputs.kernel_release }}
      kernel_releases: ${{ steps.inputs.outputs.kernel_releases }}
      base_image_name: ${{ steps.inputs.outputs.base_image_name }}
      base_image_tag: ${{ steps.inputs.outputs.base_image_tag }}
    container:
      image: ghcr.io/ublue-os/devcontainer:latest
      options: "--privileged --volume /:/host-sys --volume /var/lib/containers:/var/lib/containers --security-opt seccomp=unconfined --security-opt label=disable --user 0:0"
    steps:
      - uses: actions/checkout@v6

      - name: Resolve build inputs for this PR run
        id: inputs
        shell: bash
        env:
          USE_INPUT_LOCK: "false"
          LOCK_FILE: ci/inputs.lock.json
          BUILD_CONTAINER_REF: ${{ env.DEFAULT_BUILD_CONTAINER_IMAGE }}
          DEFAULT_BASE_IMAGE: ${{ env.DEFAULT_BASE_IMAGE }}
          DEFAULT_ZFS_MINOR_VERSION: ${{ env.DEFAULT_ZFS_MINOR_VERSION }}
          DEFAULT_AKMODS_REF: ${{ env.AKMODS_UPSTREAM_REF }}
        run: |
          python3 -m ci_tools.cli main-resolve-build-inputs

      - name: Check for existing shared self-hosted zfs akmods image
        id: akmods
        shell: bash
        env:
          FEDORA_VERSION: ${{ steps.inputs.outputs.version }}
          KERNEL_RELEASE: ${{ steps.inputs.outputs.kernel_release }}
          KERNEL_RELEASES: ${{ steps.inputs.outputs.kernel_releases }}
          AKMODS_REPO: akmods-zfs
        run: |
          python3 -m ci_tools.cli main-check-candidate-akmods-cache

      - name: Stop when shared akmods source is missing or stale
        if: steps.akmods.outputs.exists != 'true'
        shell: bash
        env:
          FEDORA_VERSION: ${{ steps.inputs.outputs.version }}
          KERNEL_RELEASES: ${{ steps.inputs.outputs.kernel_releases }}
        run: |
          echo "Shared akmods source tag akmods-zfs:main-${FEDORA_VERSION} is missing or stale for kernels ${KERNEL_RELEASES}." >&2
          echo "Run main workflow (Build And Promote Main Image) with rebuild_akmods=true, then rerun this PR workflow." >&2
          exit 1

  build-pr:
    needs: prepare-pr-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set resolved base tag and shared akmods source in recipe
        shell: bash
        env:
          AKMODS_REPO: akmods-zfs
          AKMODS_TAG_PREFIX: main
          BASE_IMAGE_NAME: ${{ needs.prepare-pr-build.outputs.base_image_name }}
          BASE_IMAGE_TAG: ${{ needs.prepare-pr-build.outputs.base_image_tag }}
        run: |
          python3 -m ci_tools.cli beta-configure-branch-recipe

      - name: Build image for PR validation (no push)
        uses: blue-build/github-action@v1.11.0
        with:
          recipe: recipe.yml
          working_directory: .generated/bluebuild/
          # PR validation should not publish artifacts.
          push: false
          # PR validation should not require signing secrets.
          build_opts: --no-sign
          registry_token: ${{ github.token }}
          maximize_build_space: true
          # Keep recipe/containerfile edits from the previous step.
          skip_checkout: true
