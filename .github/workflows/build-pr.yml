name: Build PR Image

on:
  pull_request:
    # Skip PR CI for docs/readme-only changes.
    paths-ignore:
      - README.md
      - "**/README.md"
      - docs/**
      - "**/*.md"

permissions:
  contents: read
  packages: read

env:
  # Keep PR validation on the same moving defaults as `main`.
  AKMODS_UPSTREAM_REF: 9d13b6950811cdaae2e8ab748c85c5da35810ae3
  STABLE_AKMODS_REPO: kinoite-zfs-bluebuild-akmods
  DEFAULT_BASE_IMAGE: ghcr.io/ublue-os/kinoite-main:latest
  DEFAULT_BUILD_CONTAINER_IMAGE: ghcr.io/ublue-os/devcontainer:latest
  DEFAULT_ZFS_MINOR_VERSION: "2.4"

jobs:
  prepare-pr-build:
    name: Resolve PR Build Inputs
    runs-on: ubuntu-24.04
    outputs:
      fedora_version: ${{ steps.prepare.outputs.version }}
      kernel_release: ${{ steps.prepare.outputs.kernel_release }}
      kernel_releases: ${{ steps.prepare.outputs.kernel_releases }}
      base_image_name: ${{ steps.prepare.outputs.base_image_name }}
      base_image_tag: ${{ steps.prepare.outputs.base_image_tag }}
    container:
      image: ghcr.io/ublue-os/devcontainer:latest
      options: "--privileged --volume /:/host-sys --volume /var/lib/containers:/var/lib/containers --security-opt seccomp=unconfined --security-opt label=disable --user 0:0"
    steps:
      - uses: actions/checkout@v6

      - name: Resolve PR inputs and verify shared akmods source
        id: prepare
        uses: ./.github/actions/prepare-validation-build
        with:
          akmods_repo: ${{ env.STABLE_AKMODS_REPO }}
          default_base_image: ${{ env.DEFAULT_BASE_IMAGE }}
          default_build_container_image: ${{ env.DEFAULT_BUILD_CONTAINER_IMAGE }}
          default_zfs_minor_version: ${{ env.DEFAULT_ZFS_MINOR_VERSION }}
          default_akmods_ref: ${{ env.AKMODS_UPSTREAM_REF }}

  build-pr:
    needs: prepare-pr-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure generated PR build workspace
        uses: ./.github/actions/configure-generated-build-context
        with:
          akmods_repo: ${{ env.STABLE_AKMODS_REPO }}
          akmods_tag_prefix: main
          base_image_name: ${{ needs.prepare-pr-build.outputs.base_image_name }}
          base_image_tag: ${{ needs.prepare-pr-build.outputs.base_image_tag }}

      - name: Build image for PR validation (no push)
        uses: ./.github/actions/run-bluebuild
        with:
          mode: validate
          working_directory: .generated/bluebuild/
          registry_token: ${{ github.token }}
