name: Build Branch Image

on:
  push:
    # Build branch-tagged images for non-main branches only.
    branches-ignore:
      - main
      - dependabot/**
    # Skip CI for docs/readme-only changes.
    paths-ignore:
      - README.md
      - "**/README.md"
      - docs/**
      - "**/*.md"

  workflow_dispatch:
    # Manual trigger for branch build/testing.

concurrency:
  # One active run per workflow+branch; newer pushes cancel stale runs.
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  # Keep branch validation on the same moving defaults as `main`.
  AKMODS_UPSTREAM_REF: 9d13b6950811cdaae2e8ab748c85c5da35810ae3
  STABLE_AKMODS_REPO: kinoite-zfs-bluebuild-akmods
  CANDIDATE_AKMODS_REPO: kinoite-zfs-bluebuild-akmods-candidate
  DEFAULT_BASE_IMAGE: ghcr.io/ublue-os/kinoite-main:latest
  DEFAULT_BUILD_CONTAINER_IMAGE: ghcr.io/ublue-os/devcontainer:latest
  DEFAULT_ZFS_MINOR_VERSION: "2.4"

jobs:
  prepare-branch-metadata:
    name: Compute Branch Tags
    runs-on: ubuntu-latest
    outputs:
      akmods_public_tag_prefix: ${{ steps.branch.outputs.akmods_public_tag_prefix }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute branch-safe public alias tag prefix
        id: branch
        shell: bash
        run: |
          python3 -m ci_tools.cli beta-compute-branch-metadata

  build-zfs-akmods:
    name: Build Self-Hosted ZFS Akmods (branch)
    needs: prepare-branch-metadata
    # Only trusted branch/main jobs target the dedicated repo-scoped runner VM.
    runs-on:
      - self-hosted
      - linux
      - x64
      - kinoite-zfs-builder
    outputs:
      fedora_version: ${{ steps.prepare.outputs.version }}
      kernel_release: ${{ steps.prepare.outputs.kernel_release }}
      kernel_releases: ${{ steps.prepare.outputs.kernel_releases }}
      base_image_name: ${{ steps.prepare.outputs.base_image_name }}
      base_image_tag: ${{ steps.prepare.outputs.base_image_tag }}
    permissions:
      contents: read
      # Needed to copy/publish branch alias tags in this repo's candidate akmods cache.
      packages: write
    container:
      image: ghcr.io/ublue-os/devcontainer:latest
      options: "--privileged --volume /:/host-sys --volume /var/lib/containers:/var/lib/containers --security-opt seccomp=unconfined --security-opt label=disable --user 0:0"
    steps:
      - uses: actions/checkout@v6

      - name: Resolve branch inputs and verify shared akmods source
        id: prepare
        uses: ./.github/actions/prepare-validation-build
        with:
          # Branch validation reads the repo-scoped shared cache produced by `main`.
          # Branch workflow intentionally treats this as read-only input.
          akmods_repo: ${{ env.STABLE_AKMODS_REPO }}
          default_base_image: ${{ env.DEFAULT_BASE_IMAGE }}
          default_build_container_image: ${{ env.DEFAULT_BUILD_CONTAINER_IMAGE }}
          default_zfs_minor_version: ${{ env.DEFAULT_ZFS_MINOR_VERSION }}
          default_akmods_ref: ${{ env.AKMODS_UPSTREAM_REF }}

      - name: Publish branch cache alias in candidate repo
        # Compose step means the final image build step below (`Build Custom Image`).
        # That compose step runs in a separate build environment that may not be able to
        # read every container package/tag path anonymously.
        # Important: source-code repo visibility and container package visibility
        # are separate settings. A public code repo can still have package tags
        # that require authentication in some build contexts.
        # "Branch-scoped" means the destination tag includes the branch name.
        # We copy from shared source tag to a branch-scoped tag in candidate repo
        # so compose can pull reliably without touching stable tags.
        shell: bash
        env:
          FEDORA_VERSION: ${{ steps.prepare.outputs.version }}
          SOURCE_AKMODS_REPO: ${{ env.STABLE_AKMODS_REPO }}
          DEST_AKMODS_REPO: ${{ env.CANDIDATE_AKMODS_REPO }}
          DEST_TAG_PREFIX: ${{ needs.prepare-branch-metadata.outputs.akmods_public_tag_prefix }}
          REGISTRY_ACTOR: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          python3 -m ci_tools.cli beta-publish-branch-akmods-alias

  bluebuild:
    name: Build Custom Image (branch)
    needs:
      - prepare-branch-metadata
      - build-zfs-akmods
    # Branch compose is trusted heavy work, so keep it on the dedicated runner.
    runs-on:
      - self-hosted
      - linux
      - x64
      - kinoite-zfs-builder
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure generated branch build workspace
        uses: ./.github/actions/configure-generated-build-context
        with:
          akmods_repo: ${{ env.CANDIDATE_AKMODS_REPO }}
          akmods_tag_prefix: ${{ needs.prepare-branch-metadata.outputs.akmods_public_tag_prefix }}
          base_image_name: ${{ needs.build-zfs-akmods.outputs.base_image_name }}
          base_image_tag: ${{ needs.build-zfs-akmods.outputs.base_image_tag }}

      - name: Build Custom Image
        uses: ./.github/actions/run-bluebuild
        with:
          mode: publish
          maximize_build_space: "false"
          working_directory: .generated/bluebuild/
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          retry_on_failure: "true"
