name: Build And Promote Main Image

on:
  # Nightly run to check if the newest upstream kernel still builds with ZFS.
  schedule:
    - cron:
        "00 06 * * *" # 06:00 UTC daily

  push:
    # Run this workflow only for updates to `main`.
    branches:
      - main
    # Skip this workflow for docs-only changes.
    paths-ignore:
      - README.md
      - "**/README.md"
      - docs/**
      - "**/*.md"

  workflow_dispatch:
    # Manual run for rebuilds, troubleshooting, and optional publish-to-stable.
    inputs:
      rebuild_akmods:
        # Ignore cache checks and always rebuild akmods.
        description: Force rebuild of candidate self-hosted akmods-zfs
        required: false
        default: false
        type: boolean
      promote_to_stable:
        # Set false to test candidate build without moving `latest`.
        description: Promote candidate artifacts to stable tags after success
        required: false
        default: true
        type: boolean
      use_input_lock:
        # Use values from `ci/inputs.lock.json` instead of moving `latest` tags.
        description: Use lock file inputs so you can rerun with the same base inputs
        required: false
        default: false
        type: boolean
      lock_file:
        # Repo-relative JSON file with pinned input values.
        description: Lock file path for replay mode
        required: false
        default: ci/inputs.lock.json
        type: string
      build_container_image:
        # Optional override for the builder image.
        description: Build container image/ref override (optional)
        required: false
        default: ""
        type: string

concurrency:
  # Keep only one run per branch/workflow; cancel older in-progress runs.
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  # Use a pinned akmods fork commit that includes required ZFS build deps.
  AKMODS_UPSTREAM_REPO: https://github.com/Danathar/akmods.git
  AKMODS_UPSTREAM_REF: 9d13b6950811cdaae2e8ab748c85c5da35810ae3

  # Candidate-first flow:
  # - Candidate image is built in a dedicated candidate repository.
  # - Stable `kinoite-zfs:latest` is updated only in the promote job.
  IMAGE_NAME: kinoite-zfs
  CANDIDATE_IMAGE_NAME: kinoite-zfs-candidate
  CANDIDATE_AKMODS_REPO: akmods-zfs-candidate
  STABLE_AKMODS_REPO: akmods-zfs

  # Default moving inputs used when lock mode is off.
  DEFAULT_BASE_IMAGE: ghcr.io/ublue-os/kinoite-main:latest
  DEFAULT_BUILD_CONTAINER_IMAGE: ghcr.io/ublue-os/devcontainer:latest
  DEFAULT_ZFS_MINOR_VERSION: "2.4"

jobs:
  build-zfs-akmods:
    name: Build Self-Hosted ZFS Akmods (candidate)
    runs-on: ubuntu-24.04
    outputs:
      fedora_version: ${{ steps.prepare.outputs.version }}
      kernel_release: ${{ steps.prepare.outputs.kernel_release }}
      kernel_releases: ${{ steps.prepare.outputs.kernel_releases }}
      base_image_ref: ${{ steps.prepare.outputs.base_image_ref }}
      base_image_name: ${{ steps.prepare.outputs.base_image_name }}
      base_image_tag: ${{ steps.prepare.outputs.base_image_tag }}
      base_image_pinned: ${{ steps.prepare.outputs.base_image_pinned }}
      base_image_digest: ${{ steps.prepare.outputs.base_image_digest }}
      build_container_ref: ${{ steps.prepare.outputs.build_container_ref }}
      build_container_pinned: ${{ steps.prepare.outputs.build_container_pinned }}
      build_container_digest: ${{ steps.prepare.outputs.build_container_digest }}
      zfs_minor_version: ${{ steps.prepare.outputs.zfs_minor_version }}
      akmods_upstream_ref: ${{ steps.prepare.outputs.akmods_upstream_ref }}
      use_input_lock: ${{ steps.prepare.outputs.use_input_lock }}
      lock_file_path: ${{ steps.prepare.outputs.lock_file_path }}
    permissions:
      contents: read
      # Needed to push candidate akmods images.
      packages: write
    container:
      # Can be overridden by manual input.
      image: ${{ github.event.inputs.build_container_image || 'ghcr.io/ublue-os/devcontainer:latest' }}
      # Required for current akmods build tooling.
      options: "--privileged --volume /:/host-sys --volume /var/lib/containers:/var/lib/containers --security-opt seccomp=unconfined --security-opt label=disable --user 0:0"
    steps:
      - uses: actions/checkout@v6

      - name: Resolve inputs, upload build manifest, and inspect shared akmods cache
        id: prepare
        uses: ./.github/actions/prepare-main-build-inputs
        with:
          use_input_lock: ${{ github.event.inputs.use_input_lock || 'false' }}
          lock_file: ${{ github.event.inputs.lock_file || 'ci/inputs.lock.json' }}
          build_container_ref: ${{ github.event.inputs.build_container_image || env.DEFAULT_BUILD_CONTAINER_IMAGE }}
          default_base_image: ${{ env.DEFAULT_BASE_IMAGE }}
          default_zfs_minor_version: ${{ env.DEFAULT_ZFS_MINOR_VERSION }}
          default_akmods_ref: ${{ env.AKMODS_UPSTREAM_REF }}
          # Upstream akmods publish currently writes zfs tags to `akmods-zfs`.
          # We inspect that shared source tag here, then copy it into candidate
          # alias tags before compose.
          shared_akmods_repo: ${{ env.STABLE_AKMODS_REPO }}
          build_inputs_artifact_name: build-inputs-${{ github.run_id }}

      - name: Clone upstream akmods tooling
        # Rebuild when scheduled, manually forced, or cache is missing/outdated.
        if: github.event_name == 'schedule' || github.event.inputs.rebuild_akmods == 'true' || steps.prepare.outputs.akmods_cache_exists != 'true'
        shell: bash
        env:
          AKMODS_UPSTREAM_REPO: ${{ env.AKMODS_UPSTREAM_REPO }}
          AKMODS_UPSTREAM_REF: ${{ steps.prepare.outputs.akmods_upstream_ref }}
        run: |
          python3 -m ci_tools.cli akmods-clone-pinned

      - name: Configure shared zfs target in self-hosted namespace (fallback rebuild path)
        if: github.event_name == 'schedule' || github.event.inputs.rebuild_akmods == 'true' || steps.prepare.outputs.akmods_cache_exists != 'true'
        # Namespace here means the owner/org segment in GHCR image paths
        # (for example `danathar` in `ghcr.io/danathar/...`).
        shell: bash
        env:
          FEDORA_VERSION: ${{ steps.prepare.outputs.version }}
          KERNEL_RELEASE: ${{ steps.prepare.outputs.kernel_release }}
          AKMODS_REPO: ${{ env.STABLE_AKMODS_REPO }}
          AKMODS_DESCRIPTION: Shared caching layer for pre-built zfs akmod RPMs
        run: |
          python3 -m ci_tools.cli akmods-configure-zfs-target

      - name: Build and publish shared self-hosted zfs akmods image (fallback)
        if: github.event_name == 'schedule' || github.event.inputs.rebuild_akmods == 'true' || steps.prepare.outputs.akmods_cache_exists != 'true'
        shell: bash
        env:
          # `main` follows the Fedora desktop kernel stream used by Kinoite main/latest.
          # "Stream" here means the moving track of new kernel releases over time.
          AKMODS_KERNEL: main
          AKMODS_VERSION: ${{ steps.prepare.outputs.version }}
          # Build akmods for every kernel shipped in the pinned base image.
          # Fedora keeps installonly kernels around, so one image can expose
          # more than one `/lib/modules/<kernel_release>` directory.
          KERNEL_RELEASE: ${{ steps.prepare.outputs.kernel_release }}
          KERNEL_RELEASES: ${{ steps.prepare.outputs.kernel_releases }}
          AKMODS_REPO: ${{ env.STABLE_AKMODS_REPO }}
          AKMODS_TARGET: zfs
          # ZFS version comes from input resolution (default or lock file).
          ZFS_MINOR_VERSION: ${{ steps.prepare.outputs.zfs_minor_version }}
          # Upstream akmods scripts pull OpenZFS release source from:
          # https://github.com/openzfs/zfs/releases
          CI: "1"
          REGISTRY_ACTOR: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          python3 -m ci_tools.cli akmods-build-and-publish

      - name: Publish candidate akmods alias tags
        # Compose step means the candidate image build step (`Build Candidate Image`).
        # Candidate compose/promotion read from `akmods-zfs-candidate`.
        # We copy shared source tags into candidate tags every run so the
        # candidate boundary stays explicit even when upstream push names are fixed.
        shell: bash
        env:
          FEDORA_VERSION: ${{ steps.prepare.outputs.version }}
          KERNEL_RELEASE: ${{ steps.prepare.outputs.kernel_release }}
          SOURCE_AKMODS_REPO: ${{ env.STABLE_AKMODS_REPO }}
          DEST_AKMODS_REPO: ${{ env.CANDIDATE_AKMODS_REPO }}
          REGISTRY_ACTOR: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          python3 -m ci_tools.cli main-publish-candidate-akmods-alias

  bluebuild-candidate:
    name: Build Candidate Image
    # Safety gate:
    # This job must pass before stable tags are allowed to move.
    # If candidate build fails, users stay on last known-good `latest`.
    needs: build-zfs-akmods
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure generated candidate build workspace
        uses: ./.github/actions/configure-generated-build-context
        with:
          image_name: ${{ env.CANDIDATE_IMAGE_NAME }}
          base_image_name: ${{ needs.build-zfs-akmods.outputs.base_image_name }}
          base_image_tag: ${{ needs.build-zfs-akmods.outputs.base_image_tag }}
          # Candidate image build pulls from the candidate-repo Fedora-wide
          # akmods cache tag copied earlier in this workflow.
          akmods_repo: ${{ env.CANDIDATE_AKMODS_REPO }}

      - name: Build Candidate Image
        uses: ./.github/actions/run-bluebuild
        with:
          mode: publish
          # The action's working directory is the folder it treats as the local
          # build root. We point it at the generated workspace so BlueBuild reads
          # transient run-specific files instead of the checked-in source files.
          working_directory: .generated/bluebuild/
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          retry_on_failure: "true"

  promote-stable:
    name: Promote Candidate To Stable
    # Safety model:
    # Promotion is a separate job that runs only after both candidate jobs succeed.
    # That keeps broken candidate outputs from replacing stable tags.
    # Promotion logic is fail-closed for candidate akmods:
    # if candidate akmods are missing, promotion stops with an error.
    needs:
      - build-zfs-akmods
      - bluebuild-candidate
    # Push/schedule runs promote automatically. Manual runs can skip promotion.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.promote_to_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Promote candidate image, align stable akmods, and sign stable digest
        uses: ./.github/actions/promote-stable
        with:
          registry_actor: ${{ github.actor }}
          registry_token: ${{ github.token }}
          fedora_version: ${{ needs.build-zfs-akmods.outputs.fedora_version }}
          candidate_image_name: ${{ env.CANDIDATE_IMAGE_NAME }}
          image_name: ${{ env.IMAGE_NAME }}
          candidate_akmods_repo: ${{ env.CANDIDATE_AKMODS_REPO }}
          stable_akmods_repo: ${{ env.STABLE_AKMODS_REPO }}
          image_org: ${{ github.repository_owner }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
